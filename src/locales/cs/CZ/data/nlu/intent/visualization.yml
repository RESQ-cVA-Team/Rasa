    examples: |
      - Ukaž mi [door to needle](metric) a [DIDO](metric)
      - Chci [NIHSS](metric) pro všechny pacienty
      - Dej mi [AdmissionNihss](metric) a [DischargeNihss](metric)
      - Ukaž mi [DTN](metric) pro [mužské](sex) pacienty
      - Graf [DIDO](metric) u [ženských](sex) pacientek
      - Dej mi data [NIHSS](metric) pro [muže](sex) a [ženy](sex)
  - intent: update_visualization
    examples: |
      - Změň graf na [sloupcový](chart_type)
      - Aktualizuj tak, aby zobrazoval pouze [ženské](sex) pacienty
      - Změň rozsah dat na [2023]{"entity": "date", "role": "lower"} až [2024]{"entity": "date", "role": "upper"}
      - Přepni na [hemoragický](stroke_type) typ mrtvice
      - Přidej metriku [DIDO](metric)
      - Odeber [mužské](sex) pacienty
      - Seskup data podle [typu mrtvice](group_by)
      - Změň metriku na [AdmissionNihss](metric)
      - Přepni vizualizaci na [koláčový](chart_type)
      - Uprav věkové rozmezí na [55]{"entity": "age", "role": "lower"} až [75]{"entity": "age", "role": "upper"}
      - Filtruj pouze [ischemická](stroke_type) mrtvice
      - Zobraz data po [2024-01-01]{"entity": "date", "role": "lower"}
      - Změň seskupení na [měsíc](group_by)
      - Udělej z toho [bodový](chart_type) graf
      - Aktualizuj filtr na posledních [6 měsíců]{"entity": "date", "role": "lower"}
