version: "3.1"

nlu:
  - intent: request_guided_visualization
    examples: |
      - ano
      - ano prosím
      - jistě
      - dobře
      - pojďme na to
      - pomoz mi vytvořit graf
      - proveď mě vytvořením grafu
      - ukaž mi to krok za krokem
      - pomoz mi vytvořit vizualizaci
      - můžeš mě tím provést krok po kroku

  - intent: request_freeform_visualization
    examples: |
      - popíšu to sám
      - nech mě napsat požadavek
      - chci to zadat volně
      - prostě řeknu, co chci
      - napíšu to v jedné zprávě

  - intent: cancel_guided_visualization
    examples: |
      - přepni na volný režim
      - přepni na režim jedné zprávy
      - ukonči vedený režim
      - zastav vedený režim
      - zruš vedený postup
      - zruš vedený režim

  - intent: provide_guided_hospital_scope
    examples: |
      - provider [289](provider_id)
      - použij provider id [281](provider_id)
      - provider group [10](provider_group_id)
      - group id [25](provider_group_id)
      - [mine](scope_kind)
      - použij [my hospital](scope_kind)
      - [my provider group](scope_kind)
      - [our group](scope_kind)
      - použij [CZ](country_code)
      - [Czech Republic](country_code)
      - [ES](country_code)
      - [Spain](country_code)
      - [Mexico](country_code)
      - v [EMEA](region)
      - [LATAM](region)

  - intent: skip_guided_step
    examples: |
      - přeskočit
      - přeskoč to
      - ne
      - ne díky
      - teď ne
      - možná později
      - bez filtru
      - žádné
      - nechat prázdné
