version: "3.1"

nlu:
  - intent: request_guided_visualization
    examples: |
      - yes
      - yes please
      - sure
      - okay
      - let's do it
      - help me build a graph
      - guide me through creating a graph
      - walk me through a visualization
      - help me make a chart
      - can you guide me step by step

  - intent: request_freeform_visualization
    examples: |
      - I'll describe it myself
      - let me type the request
      - I want to do it freeform
      - I'll just say what I want
      - I'll do it in one message

  - intent: cancel_guided_visualization
    examples: |
      - switch to freeform mode
      - switch to one-shot mode
      - exit guided mode
      - stop guided mode
      - cancel the guided flow
      - cancel guided mode
      - end guided mode

  - intent: provide_guided_hospital_scope
    examples: |
      - provider [289](provider_id)
      - use provider id [281](provider_id)
      - provider group [10](provider_group_id)
      - group id [25](provider_group_id)
      - [mine](scope_kind)
      - use [my hospital](scope_kind)
      - [my provider group](scope_kind)
      - [our group](scope_kind)
      - use [US](country_code)
      - [United States](country_code)
      - [ES](country_code)
      - [Spain](country_code)
      - [Mexico](country_code)
      - in [EMEA](region)
      - [LATAM](region)

  - intent: skip_guided_step
    examples: |
      - skip
      - skip this
      - next
      - continue
      - move on
      - no
      - no thanks
      - not now
      - maybe later
      - nope
      - nah
      - no filter
      - none
      - leave it blank
