version: "3.1"
responses:
  utter_user_prompt:
    - text: "How can I help you?"
      buttons:
        - title: "How do I use this bot?"
          payload: "How do I use this bot?"
        - title: "Show me a guided visualization"
          payload: "Show me a guided visualization"
        - title: "I want to describe my graph in one message"
          payload: "I want to describe my graph in one message"

  utter_who_are_you:
    - text: "I am a bot that can help you visualize RES-Q data. I can guide you step by step to build a graph, or you can describe the graph you want in one message and I'll try to build it for you."
