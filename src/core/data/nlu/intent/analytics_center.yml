version: "3.1"

nlu:
  - lookup: scope_kind
    examples: |
      - mine
      - provider_group
      - country
      - country_average

  - synonym: mine
    examples: |
      - my hospital
      - our hospital
      - my site
      - my center
      - my provider

  - synonym: provider_group
    examples: |
      - my group
      - our group
      - my network
      - our network
      - my provider group

  - synonym: country
    examples: |
      - my country
      - our country

  - synonym: country_average
    examples: |
      - national average
      - national mean
      - nationwide average
      - nationwide mean

  - lookup: country_code
    examples: |
      - [placeholder] localized in en/us or locale overlays

  - synonym: US
    examples: |
      - [placeholder] localized in en/us or locale overlays

  - synonym: ES
    examples: |
      - [placeholder] localized in en/us or locale overlays

  - synonym: MX
    examples: |
      - [placeholder] localized in en/us or locale overlays

  - regex: provider_id
    examples: |
      - (?i)\b(?:provider|hospital)\s+(\d{1,6})\b

  - regex: provider_group_id
    examples: |
      - (?i)\b(?:provider\s+group|group|network)\s+(\d{1,6})\b
