version: "3.1"

rules:
  - rule: Greet and offer help
    steps:
      - intent: greet
      - action: utter_greet
      - action: utter_user_prompt

  - rule: Greet after guided offer has been shown #Should this be deleted?
    condition:
      - slot_was_set:
          - guided_offer_shown: true
    steps:
      - intent: greet
      - action: utter_greet

  - rule: goodbye
    steps:
      - intent: goodbye
      - action: utter_goodbye
