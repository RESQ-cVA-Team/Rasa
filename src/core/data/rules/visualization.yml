version: "3.1"

rules:
  # Fresh visualization request - not mid-clarification
  - rule: generate visualization
    condition:
      - active_loop: null
      - slot_was_set:
          - awaiting_visualization_clarification: false
    steps:
      - intent: generate_visualization
      - action: action_clarify_visualization_request

  # Update visualization - not mid-clarification
  - rule: update visualization
    condition:
      - active_loop: null
      - slot_was_set:
          - awaiting_visualization_clarification: false
    steps:
      - intent: update_visualization
      - action: action_clarify_visualization_request

  # Any user reply while we're waiting for clarification
  # (covers generate_visualization, update_visualization, clarify_visualization,
  #  and any reasonably recognised intent that is a clarification answer)
  - rule: handle reply while awaiting clarification
    condition:
      - active_loop: null
      - slot_was_set:
          - awaiting_visualization_clarification: true
    steps:
      - intent: clarify_visualization
      - action: action_clarify_visualization_request

  - rule: handle generate intent while awaiting clarification
    condition:
      - active_loop: null
      - slot_was_set:
          - awaiting_visualization_clarification: true
    steps:
      - intent: generate_visualization
      - action: action_clarify_visualization_request

  - rule: handle update intent while awaiting clarification
    condition:
      - active_loop: null
      - slot_was_set:
          - awaiting_visualization_clarification: true
    steps:
      - intent: update_visualization
      - action: action_clarify_visualization_request

  # NLU fallback while awaiting clarification
  - rule: re-ask on nlu fallback while awaiting clarification
    condition:
      - active_loop: null
      - slot_was_set:
          - awaiting_visualization_clarification: true
    steps:
      - intent: nlu_fallback
      - action: action_clarify_visualization_request

  - rule: re-ask on fallback while awaiting clarification
    condition:
      - active_loop: null
      - slot_was_set:
          - awaiting_visualization_clarification: true
    steps:
      - intent: fallback
      - action: action_clarify_visualization_request

  - rule: handle hospital scope intent while awaiting clarification
    condition:
      - active_loop: null
      - slot_was_set:
          - awaiting_visualization_clarification: true
    steps:
      - intent: provide_guided_hospital_scope
      - action: action_clarify_visualization_request
